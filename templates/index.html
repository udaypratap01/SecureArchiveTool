<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Password Cracker - Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 12px 15px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: background 0.3s;
        }

        .file-input-label:hover {
            background: #5568d3;
        }

        .file-name {
            margin-top: 8px;
            color: #666;
            font-size: 0.9em;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #f84236;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #d63c30;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(248, 66, 54, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-section {
            grid-column: 1 / -1;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .messages {
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message {
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #ccc;
        }

        .message.info {
            background: #e3f2fd;
            border-left-color: #2196f3;
            color: #1565c0;
        }

        .message.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .message.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .message.time {
            color: #999;
            font-size: 0.85em;
        }

        .result-box {
            background: white;
            border: 2px solid #4caf50;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }

        .result-box h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .password-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            font-weight: bold;
            color: #4caf50;
            word-break: break-all;
        }

        .files-container {
            margin-top: 15px;
        }

        .file-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item .file-icon {
            margin-right: 10px;
            font-size: 1.5em;
        }

        .file-item .file-name {
            flex: 1;
            word-break: break-word;
        }

        .file-item .file-content {
            max-height: 200px;
            overflow-y: auto;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            width: 100%;
            font-family: monospace;
            font-size: 0.85em;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-badge.cracking {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.found {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.not-found {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Archive Password Cracker</h1>
            <p>Web-based password recovery tool for ZIP and RAR files</p>
        </div>

        <div class="content">
            <!-- Left Column: Upload Section -->
            <div class="section">
                <h2>Upload Files</h2>
                
                <div class="form-group">
                    <label>Archive File (ZIP or RAR)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="archiveInput" accept=".zip,.rar">
                        <label for="archiveInput" class="file-input-label">📁 Choose Archive</label>
                    </div>
                    <div class="file-name" id="archiveFileName">No file selected</div>
                </div>

                <div class="form-group">
                    <label>Password List (TXT)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="passwordInput" accept=".txt">
                        <label for="passwordInput" class="file-input-label">📋 Choose Password List</label>
                    </div>
                    <div class="file-name" id="passwordFileName">No file selected</div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="startBtn" onclick="startCracking()">
                        ▶️ Start Cracking
                    </button>
                    <button class="btn-danger" id="stopBtn" onclick="stopCracking()" disabled>
                        ⏹️ Stop
                    </button>
                </div>
            </div>

            <!-- Right Column: Status Section -->
            <div class="section">
                <h2>Status</h2>
                <div id="statusArea">
                    <p id="statusText">Ready to crack passwords</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                    </div>
                    <div id="resultArea"></div>
                </div>
            </div>

            <!-- Full Width: Messages and Results -->
            <div class="section progress-section">
                <h2>📝 Messages</h2>
                <div class="messages" id="messagesBox">
                    <div class="empty-state">Messages will appear here...</div>
                </div>
            </div>

            <!-- Files Section -->
            <div class="section progress-section" id="filesSection" style="display:none;">
                <h2>📦 Extracted Files</h2>
                <div class="files-container" id="filesContainer"></div>
            </div>
        </div>

        <div class="footer">
            <p>SecureArchiveTool © 2026 | Web UI v1.0</p>
        </div>
    </div>

    <script>
        // File upload handling
        document.getElementById('archiveInput').addEventListener('change', function() {
            document.getElementById('archiveFileName').textContent = 
                this.files[0] ? '✓ ' + this.files[0].name : 'No file selected';
        });

        document.getElementById('passwordInput').addEventListener('change', function() {
            document.getElementById('passwordFileName').textContent = 
                this.files[0] ? '✓ ' + this.files[0].name : 'No file selected';
        });

        // Start cracking
        async function startCracking() {
            const archiveInput = document.getElementById('archiveInput');
            const passwordInput = document.getElementById('passwordInput');

            if (!archiveInput.files[0] || !passwordInput.files[0]) {
                alert('Please select both archive and password list files');
                return;
            }

            const formData = new FormData();
            formData.append('archive', archiveInput.files[0]);
            formData.append('passwords', passwordInput.files[0]);

            try {
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('messagesBox').innerHTML = '';
                document.getElementById('filesSection').style.display = 'none';
                document.getElementById('resultArea').innerHTML = '';

                const response = await fetch('/api/crack', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    addMessage(error.error || 'Error starting crack', 'error');
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    return;
                }

                addMessage('Cracking started...', 'info');
                
                // Poll for status updates
                const statusInterval = setInterval(async () => {
                    try {
                        const statusResp = await fetch('/api/status');
                        if (!statusResp.ok) {
                            throw new Error('Status endpoint returned ' + statusResp.status);
                        }
                        const text = await statusResp.text();
                        if (!text) {
                            throw new Error('Empty response from server');
                        }
                        const status = JSON.parse(text);

                        // Add new messages
                        if (status.messages && status.messages.length > 0) {
                            const currentMessages = document.querySelectorAll('.message');
                            const lastCount = currentMessages.length;
                            
                            if (status.messages.length > lastCount) {
                                for (let i = lastCount; i < status.messages.length; i++) {
                                    const msg = status.messages[i];
                                    addMessageElement(msg);
                                }
                            }
                        }

                        // Update progress
                        if (status.progress > 0) {
                            document.getElementById('progressFill').style.width = status.progress + '%';
                            document.getElementById('progressFill').textContent = status.progress + '%';
                        }

                        // Check if password found
                        if (status.found_password) {
                            showPasswordFound(status.found_password, status.archive_contents);
                        }

                        // Check if done
                        if (!status.is_cracking) {
                            clearInterval(statusInterval);
                            document.getElementById('startBtn').disabled = false;
                            document.getElementById('stopBtn').disabled = true;
                            
                            if (!status.found_password) {
                                document.getElementById('statusText').innerHTML = 
                                    '<span class="status-badge not-found">Password not found</span>';
                            }
                        }
                    } catch (error) {
                        console.error('Status polling error:', error);
                        addMessage('Connection error: ' + error.message, 'error');
                    }
                }, 500);

            } catch (error) {
                addMessage('Error: ' + error.message, 'error');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        // Stop cracking
        async function stopCracking() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                addMessage('Cracking stopped', 'info');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            } catch (error) {
                console.error('Error stopping:', error);
            }
        }

        // Add message to display
        function addMessage(text, type) {
            const msg = {
                time: new Date().toLocaleTimeString(),
                text: text,
                type: type
            };
            addMessageElement(msg);
        }

        function addMessageElement(msg) {
            const messagesBox = document.getElementById('messagesBox');
            
            if (messagesBox.querySelector('.empty-state')) {
                messagesBox.innerHTML = '';
            }

            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + msg.type;
            messageEl.innerHTML = `<span class="message time">[${msg.time}]</span> ${msg.text}`;
            messagesBox.appendChild(messageEl);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        // Show password found
        function showPasswordFound(password, contents) {
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="result-box">
                    <h3>✓ Password Found!</h3>
                    <div class="password-display">${escapeHtml(password)}</div>
                </div>
            `;

            if (contents && contents.length > 0) {
                document.getElementById('filesSection').style.display = 'block';
                const filesContainer = document.getElementById('filesContainer');
                filesContainer.innerHTML = '';

                contents.forEach((file, index) => {
                    const fileEl = document.createElement('div');
                    fileEl.className = 'file-item';
                    
                    let icon = file.type === 'text' ? '📄' : '📦';
                    let content = file.type === 'text' ? 
                        `<div class="file-content">${escapeHtml(file.content)}</div>` : '';

                    fileEl.innerHTML = `
                        <div>
                            <div class="file-icon">${icon}</div>
                            <div class="file-name"><strong>${escapeHtml(file.name)}</strong></div>
                            ${content}
                        </div>
                    `;
                    filesContainer.appendChild(fileEl);
                });
            }
        }

        // Utility functions
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initial status check
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) {
                    addMessage('⚠️ Cannot connect to server on port 5000', 'error');
                    addMessage('Make sure Flask server is running: python web_app.py', 'info');
                    return;
                }
                const status = await response.json();
                if (status.messages.length === 0) {
                    addMessage('✓ Server connected. Ready to crack passwords', 'success');
                }
            } catch (error) {
                addMessage('⚠️ Connection failed: ' + error.message, 'error');
                addMessage('Make sure Flask server is running: python web_app.py', 'info');
            }
        });
    </script>
</body>
</html>
